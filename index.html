<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>Virtual Piano</title>

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

  <style>

    body{
        margin:0;
        padding:0;
        background:#111;
        color:white;
        font-family:Arial;
        text-align:center;
    }

    h1{
        margin-top:20px;
        margin-bottom:20px;
    }

    .container{
        position:relative;
        width:1000px;
        margin:auto;
    }

    video{
        display:none;
    }

    .output_canvas{
        width:1000px;
        height:700px;
        border:2px solid white;
        border-radius:10px;
        background:black;
    }

  </style>

</head>

<body>

<h1>Virtual Piano Hand Tracking</h1>

<div class="container">

  <video class="input_video"></video>

  <canvas
          class="output_canvas"
          width="1000"
          height="700">
  </canvas>

</div>

<script src="./js/piano.js"></script>
<script src="./js/coordinate.js"></script>
<script src="./js/hands.js"></script>

</body>

</html>
